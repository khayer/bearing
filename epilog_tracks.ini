# pyGenomeTracks configuration -- template generated by bigwig_to_qcat.py
# Edit file paths before use.
# Usage:
#   pyGenomeTracks --tracks epilog_tracks.ini --region chr6:30000000-50000000 -o out.png

# --- Epilogos stacked bar tracks ---

[epilogos]
file = my_experiment.qcat.bgz
categories_file = my_experiment_cats.json
height = 5
title = Epilogos (mm10)

[spacer]
height = 0.3

[epilogos inverted]
file = my_experiment.qcat.bgz
categories_file = my_experiment_cats.json
height = 5
title = Epilogos inverted
orientation = inverted

[spacer]
height = 0.5

# --- Input BigWig tracks (colored to match epilogos categories) ---

[bigwig ATAC]
file = atac.bw
title = ATAC
color = #00b050
height = 2
min_value = 0
max_value = auto
type = fill
nans_to_zeros = true
show_data_range = true

[spacer]
height = 0.1

[bigwig RNAseq_+]
file = rnaseq_plus.bw
title = RNAseq +
color = #6495ed
height = 2
min_value = 0
max_value = auto
type = fill
nans_to_zeros = true
show_data_range = true

[spacer]
height = 0.1

# RNAseq - is negative strand: values range from -inf to 0.
# min_value = auto / max_value = 0 displays it as a downward fill.
[bigwig RNAseq_-]
file = rnaseq_minus.bw
title = RNAseq -
color = #1a3a8f
height = 2
min_value = auto
max_value = 0
type = fill
nans_to_zeros = true
show_data_range = true

[spacer]
height = 0.1

# (add remaining bigwig tracks here in the same pattern)

[spacer]
height = 0.5

# --- BED annotation tracks ---

[bed cbe mm10]
file = cbe_mm10.bed
title = cbe mm10
height = 3
fontsize = 10
file_type = bed
gene_rows = 5
color = #1f78b4
border_color = black
display = stacked
style = UCSC
show_labels = true

[spacer]
height = 0.2

[bed AgRgenes mm10 s]
file = AgRgenes_mm10_s.bed
title = AgRgenes mm10 s
height = 3
fontsize = 10
file_type = bed
gene_rows = 5
color = #1f78b4
border_color = black
display = stacked
style = UCSC
show_labels = true

[spacer]
height = 0.2

# --- Vertical lines (start positions from cbe_mm10.bed drawn across all tracks) ---

[vlines]
file = cbe_mm10.bed
type = vlines
line_width = 1.5
color = #e41a1c
alpha = 0.7

[x-axis]
