# BEARING workflow configuration.
# A single `snakemake` invocation runs the whole pipeline; Hi-C phases only
# run if the sheet defines Hi-C conditions (rows with a cool path).

# --- inputs ---------------------------------------------------------------
# Directory the sheet's RELATIVE bw/cool paths (../bigwigs, ../hic_files, ...)
# resolve against. Leave blank to use the directory you launch snakemake from.
# Set explicitly if you launch from elsewhere or use the SLURM executor:
data_dir: "/mnt/isilon/bassing_lab/integration_paper/bearing"

samples_sheet: "config/samples.tsv"
categories:    "../categories/mm10_6track_panel.yaml"
chrom_sizes:   "resources/mm10.chrom.sizes"
regions_file:  "config/regions.tsv"
genes_bed:     "resources/mm10_genes.bed"
agr_genes_bed: "resources/AgRgenes_mm10_s.bed"
gtf:           "resources/gencode.vM23.annotation_modified_overlaps_removed_sorted.gtf"
blacklist_external: "resources/mm10-blacklist.v2.bed"   # merged with detected

# --- parameters to CONFIRM (these set whether the rerun matches the paper) --
min_signal: 0.1
# Differential-score floor for bearing_pvalue.py --diff. Bins whose |summed
# differential| falls below this are not tested at all. DISTINCT from min_signal
# above, which is a per-sample RAW-signal floor. 0.5 matches the historical
# bearing_pvalue.py default for KL scores; set explicitly so runs stay
# reproducible if that default ever changes. Sensitivity: Supplementary
# Table S14 / Figure S11.
pvalue_min_signal: 0.5

# Sensitivity sweep for the floor above (Supplementary Figure S11 / Table S14).
floor_sweep_floors: [0.1, 0.25, 0.5, 1.0, 1.5]
floor_sweep_threads: 12
normalize: ""          # "" = off (Methods M.2); or "--normalize-method nonzero-quantile"
n_perms: 100
min_shift: 1500000
seed: 42
blacklist_merge_distance: 3003

# --- comparisons ----------------------------------------------------------
reference_condition: DN          # differentials are DN-vs-<each other condition>

# --- Hi-C parameters (used only if the sheet defines Hi-C conditions) ------
hic:
  resolutions: [10000, 25000, 100000, 250000, 500000]
  contact_resolution: 10000      # figures / contact isolation / crosslocus
  # Resolution for TAD-insulation (.bm) tracks used by the BES-Hi-C rules
  # (bes_hic_within, hic_crosslocus). Insulation .bm files do NOT exist at
  # 10000 for all conditions (only DN/DP/ProB); 25000 is the resolution all
  # five share. The script does an interval lookup, so insul may be a coarser
  # resolution than contact_resolution (each 10k contact bin picks up the 25k
  # insulation value covering it).
  insulation_resolution: 25000
  tad_dir: "../tads"
  # Resolutions to run TAD-extension and compartment analyses at. Set these to
  # the resolutions that actually exist on disk (domain BEDs / pca1 BigWigs).
  tad_resolutions: [25000, 100000, 250000, 500000]
  compartment_resolutions: [100000, 250000, 500000]
  tad_anchor: "chr6:41550000"
  features_bed: "annotations/tcrb_extension_features.bed"
  compartment_region: "chr6:39000000-55000000"
  isolation_target: "chr6:40850000-41600000"
  isolation_window: 750000
  isolation_max_distance: 6000000
  isolation_perm_n: 200
  crosslocus_targets: "annotations/targets.tsv"

# --- locations ------------------------------------------------------------
outdir: "results"
bearing_dir: ".."
container: "bearing.sif"

# --- optional input staging (no aws/mount-s3 on cluster) -------------------
# Host inputs behind HTTPS (public bucket or presigned URLs) and put those URLs
# in the sheet. Run workflow/stage_inputs.py once to wget them to a local cache
# and emit a localized sheet, then point samples_sheet at that localized sheet:
#   python3 workflow/stage_inputs.py --sheet workflow/config/samples.tsv \
#       --out-sheet workflow/config/samples.local.tsv --cache-dir resources/staged
#   snakemake ... --config samples_sheet=workflow/config/samples.local.tsv
