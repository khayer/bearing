# SLURM execution profile -- Snakemake submits each rule as its own sbatch job.
#   snakemake -s workflow/Snakefile --configfile workflow/config/config.yaml \
#             --profile workflow/profiles/slurm
#
# Runs jobs in the ACTIVE conda env (no container). Add --use-apptainer to run
# inside the image instead (pull it first with workflow/get_container.sh).

executor: slurm
scheduler: greedy
jobs: 144                 # max concurrent cluster jobs
printshellcmds: true
rerun-incomplete: true
# Retry a failed job automatically. Per-sample perm jobs occasionally fail
# transiently under heavy concurrent load (many simultaneous big reads against
# the shared filesystem can make the pyBigWig C reader fail or abort). Such
# failures pass on a retry; deterministic errors still fail after exhausting
# retries. 3 retries comfortably covers transient filesystem hiccups.
retries: 3
# Re-run a job only when its INPUTS are newer than its outputs (mtime), not
# when the rule's code/params change. Without this, editing the Snakefile
# re-triggers completed data steps. Set this once you trust the code is final;
# if you change a rule in a way that DOES change results, manually delete its
# outputs (or the .done sentinel) to force a rerun.
rerun-triggers: mtime

# Shared filesystems (Isilon/NFS) propagate new files to the head node with a
# lag; without a generous wait, Snakemake declares outputs "missing" seconds
# after a job that actually succeeded. 120s covers typical Isilon latency.
latency-wait: 120

default-resources:
  slurm_partition: "dbhiq,defq"
  mem_mb: 16000
  runtime: 240           # minutes
  # cpus_per_task is set per-rule in the Snakefile (matches each rule's
  # threads). Single-core rules fall back to 1 here.
  cpus_per_task: 1
  # Node-local /tmp on dbhiq nodes is only 8GB. Heavy multi-worker scoring
  # and perm jobs (multiprocessing.Pool with per-chrom savez intermediates)
  # spill that quickly and crash with OSError 28 "No space left on device"
  # (observed on the qnorm rerun, 2026-06-23). Point TMPDIR at the 27TB
  # Isilon scratch mount instead; Python's tempfile honors $TMPDIR which
  # Snakemake sets from this value, so no code changes are required. The
  # scratch directory must exist and be writable before launch; create with
  # `mkdir -p /mnt/isilon/scratch/$USER/snakemake`.
  tmpdir: "/scr1/users/hayerk/snakemake"
  # If your cluster requires an account, uncomment and set it (otherwise
  # Snakemake tries to guess and you may see a harmless sacct warning):
  # slurm_account: "bassing_lab"
