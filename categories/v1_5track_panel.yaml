# Bearing category configuration -- mm10 5-track panel (V1-region use case)
#
# Reference-free attribution panel for the Allyn 2025 V1-region Tcrb mutants
# (DN/R1KO, V1P, RCTKO). No ATAC and no H3K27ac: RCTKO has no H3K27ac on GEO,
# so the three-way intersection drops it; ATAC was not assayed. NIPBL is added
# as the cohesin-loader track, making this an RNA + architectural panel.
#
# Order here MUST match the bw column order in config/samples_v1.tsv.
# CTCF is mixed-platform by design (CUT&RUN for DN/RCTKO, ChIP for V1P).
#
# Fields per entry:
#   name             : human-readable assay label
#   color            : hex color for pyGenomeTracks plots and bristle panels
#   negative_strand  : true if BigWig encodes negative-strand signal

name: "mm10 5-track panel (V1)"
genome: mm10

categories:
  - name: "RNAseq +"
    color: "#6495ed"

  - name: "RNAseq -"
    color: "#1a3a8f"
    negative_strand: true

  - name: CTCF
    color: "#ff2200"

  - name: Cohesin
    color: "#8b0000"

  - name: NIPBL
    color: "#00bcd4"
